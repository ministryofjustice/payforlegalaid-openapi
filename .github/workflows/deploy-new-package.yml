name: Publish package to GitHub Packages

on:
  push:
    branches:
      - main

jobs:
  feature_branch:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: maven-release

    permissions:
      contents: read
      packages: write
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '25'
          distribution: 'corretto'

      - name: Create package
        run: mvn -e -X --batch-mode package

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0

      - name: Snyk scan published package
        run: snyk test --severity-threshold=high --sarif-file-output=snyk-publish.sarif
        env:
           SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        shell: bash

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
            sarif_file: snyk-publish.sarif

      - name: Publish package to GitHub Packages
        run: mvn -e -X --batch-mode deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tag using deploy key
        uses: './.github/create-tag'
        env:
          DEPLOY_KEY: ${{ secrets.OPENAPI_DEPLOY_KEY }}
