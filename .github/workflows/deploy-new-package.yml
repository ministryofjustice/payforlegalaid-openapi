name: Publish package to GitHub Packages

on:
  push:
    branches:
      - main

jobs:
  feature_branch:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: maven-release

    permissions:
      contents: read
      packages: write
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: '25'
          distribution: 'corretto'

      - name: Create package
        run: mvn -e -X --batch-mode package

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0

      - name: Snyk scan published package
        run: snyk test --severity-threshold=high --sarif-file-output=snyk-publish.sarif
        env:
           SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        shell: bash

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
            sarif_file: snyk-publish.sarif

      - name: Publish package to GitHub Packages
        run: mvn -e -X --batch-mode deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tag using deploy key
        uses: './.github/create-tag'
        env:
          DEPLOY_KEY: ${{ secrets.OPENAPI_DEPLOY_KEY }}
