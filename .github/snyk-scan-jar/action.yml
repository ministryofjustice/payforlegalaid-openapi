name: Build and run tests

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Setup Java
      uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
      with:
        distribution: 'corretto'
        java-version: '25'

    - name: Run build
      run: mvn -B clean package
      shell:
        bash

    - name: Find built JAR
      id: find-jar
      run: |
        JAR_FILE=$(ls target/*.jar)
        echo "jar_file=$JAR_FILE" >> $GITHUB_OUTPUT
      shell: bash

    - name: Setup Snyk CLI
      uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04

    - name: Snyk scan JAR
      run: snyk test --file=$OUTPUT_FILE --sarif-file-output=snyk-jar.sarif --severity-threshold=high
      env:
        SNYK_TOKEN: ${{ env.SNYK_TOKEN }}
        OUTPUT_FILE: ${{ steps.find-jar.outputs.jar_file }}
      shell: bash

    - name: Upload SARIF to GitHub Security tab
      uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      with:
        sarif_file: snyk-jar.sarif